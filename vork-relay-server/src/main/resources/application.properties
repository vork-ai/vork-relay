spring.application.name=vork-relay
server.port=8090

# ── TLS / Let's Encrypt ──────────────────────────────────────────────────────
# Directory where Let's Encrypt PEM files are stored.
# Must be writable by the relay process.  Override in production via
# environment variable VORK_RELAY_CERT_DIR or a bind-mounted Docker volume.
vork.relay.cert-dir=/etc/vork/relay/certs

# ── Actuator: expose only the health probe ────────────────────────────────────
# All sensitive endpoints (heapdump, threaddump, env, beans, loggers) are
# explicitly disabled.  A heap dump would expose active ciphertext in RAM.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.heapdump.enabled=false
management.endpoint.threaddump.enabled=false
management.endpoint.env.enabled=false
management.endpoint.beans.enabled=false
management.endpoint.mappings.enabled=false
management.endpoint.loggers.enabled=false
management.endpoint.conditions.enabled=false
management.endpoint.scheduledtasks.enabled=false

# ── Relay tuning ──────────────────────────────────────────────────────────────
# TTL (minutes) after which unread forms and responses are evicted from RAM.
vork.relay.ttl-minutes=15
# Hard cap on in-memory entries to prevent unbounded memory growth.
vork.relay.max-entries=1000
# Optional API key required in the X-Relay-Token header for form uploads.
# Leave blank to allow unauthenticated uploads (development only).
vork.relay.upload-token=

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true
