# Vork Relay — runtime configuration
#
# This file is preserved across package upgrades (it is a conffile).
# Restart the service after any change:
#   systemctl restart vork-relay
#
# Full documentation: /usr/lib/vork-relay/README (or see the project README)

# ── TLS / Let's Encrypt ───────────────────────────────────────────────────────
# Directory where the Let's Encrypt PEM files are stored.
# Created with correct ownership (vork-relay:vork-relay, mode 750) by the
# package installer.  The server must be able to write here.
vork.relay.cert-dir=/etc/vork/relay/certs

# ── Relay tuning ──────────────────────────────────────────────────────────────
# Hard cap on in-memory relay sessions.  Each session holds two small
# AES-256-GCM payloads; memory pressure is negligible up to ~10 000 sessions.
vork.relay.max-entries=1000

# Time (minutes) after which unread forms and unpolled responses are
# evicted from memory.  Vork agents time out after this window.
vork.relay.ttl-minutes=15

# ── Upload security ───────────────────────────────────────────────────────────
# Optional pre-shared secret required in the X-Relay-Token header for form
# uploads.  Without this, any caller who learns a valid session UUID can
# upload a form (though they cannot read responses without the AES key).
#
# Generate a strong value:  openssl rand -base64 32
# Then uncomment and set:
# vork.relay.upload-token=

# ── Logging ───────────────────────────────────────────────────────────────────
# Write a rolling log file in addition to journald.
# View live logs via systemd:  journalctl -u vork-relay -f
logging.file.name=/var/log/vork-relay/vork-relay.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
# Set to DEBUG for detailed startup and request tracing:
logging.level.sh.vork=INFO
